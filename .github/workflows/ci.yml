name: CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      DATABASE_URL: postgres://c3_app:c3_test_password@127.0.0.1:5432/c3_test
      TEST_DATABASE_URL: postgres://c3_app:c3_test_password@127.0.0.1:5432/c3_test
      C3_RUN_POSTGRES_TESTS: "1"
      TOTP_ENCRYPTION_KEY: ci-only-totp-encryption-key-with-at-least-32-characters
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: c3_test
          POSTGRES_USER: c3_app
          POSTGRES_PASSWORD: c3_test_password
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U c3_app -d c3_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run lint
      - run: npm run api:migrate
      - run: npm test
      - run: npm run build
      - run: npx playwright install --with-deps chromium
      - run: npm run test:browser
      - run: npm audit --omit=dev
